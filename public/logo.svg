<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <!-- Rallyeclub Klostertal — own mark: no checkered flag; Klostertal road + RCK wordmark -->
  <rect width="40" height="40" rx="8" fill="#0A0A0A"/>
  <!-- Single racing accent bar (not a chessboard) -->
  <rect x="7" y="9" width="26" height="3" rx="1.5" fill="#E10600"/>
  <!-- Subtle valley / road curve (Klostertal region cue) -->
  <path
    d="M6 31c6-4 22-4 28 0"
    stroke="#E10600"
    stroke-width="1.25"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />
  <text
    x="20"
    y="26.5"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="system-ui,Segoe UI,sans-serif"
    font-size="12"
    font-weight="800"
    letter-spacing="0.14em"
  >
    RCK
  </text>
</svg>
